<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Warm cream background -->
  <rect width="1200" height="630" fill="#fdfaf6"/>

  <!-- Subtle decorative circles -->
  <circle cx="950" cy="120" r="200" fill="#f0eafc" opacity="0.3"/>
  <circle cx="1050" cy="350" r="150" fill="#fff5f5" opacity="0.3"/>
  <circle cx="150" cy="500" r="120" fill="#e8f5e9" opacity="0.3"/>

  <!-- Hook icon (stylized) -->
  <g transform="translate(100, 140)">
    <path d="M 40 0 L 40 140 Q 40 200 100 200 Q 160 200 160 140 L 160 120"
          stroke="#e8856c" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Strike-through -->
    <line x1="20" y1="60" x2="180" y2="160" stroke="#c53030" stroke-width="4" opacity="0.5"/>
    <line x1="180" y1="60" x2="20" y2="160" stroke="#c53030" stroke-width="4" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="340" y="200" font-size="52" font-weight="700" fill="#2d3748">The Hook That</text>
  <text x="340" y="268" font-size="52" font-weight="700" fill="#c53030">Didn't Hook</text>

  <!-- Subtitle -->
  <text x="340" y="330" font-size="22" fill="#5a6577" font-weight="400">AI guardrails that failed four times</text>
  <text x="340" y="362" font-size="22" fill="#5a6577" font-weight="400">and the lessons we learned fixing them</text>

  <!-- Four failure badges -->
  <g transform="translate(340, 410)">
    <rect x="0" y="0" width="155" height="44" rx="22" fill="#fff5f5" stroke="#e8856c" stroke-width="1.5"/>
    <text x="78" y="18" text-anchor="middle" font-size="10" fill="#8b95a5" font-weight="500">FAILURE 1</text>
    <text x="78" y="34" text-anchor="middle" font-size="12" fill="#c53030" font-weight="600">Wrong file</text>

    <rect x="175" y="0" width="155" height="44" rx="22" fill="#fff5f5" stroke="#e8856c" stroke-width="1.5"/>
    <text x="253" y="18" text-anchor="middle" font-size="10" fill="#8b95a5" font-weight="500">FAILURE 2</text>
    <text x="253" y="34" text-anchor="middle" font-size="12" fill="#c53030" font-weight="600">Fail-open</text>

    <rect x="350" y="0" width="155" height="44" rx="22" fill="#fff5f5" stroke="#e8856c" stroke-width="1.5"/>
    <text x="428" y="18" text-anchor="middle" font-size="10" fill="#8b95a5" font-weight="500">FAILURE 3</text>
    <text x="428" y="34" text-anchor="middle" font-size="12" fill="#c53030" font-weight="600">Wrong gate</text>

    <rect x="525" y="0" width="155" height="44" rx="22" fill="#fff5f5" stroke="#e8856c" stroke-width="1.5"/>
    <text x="603" y="18" text-anchor="middle" font-size="10" fill="#8b95a5" font-weight="500">FAILURE 4</text>
    <text x="603" y="34" text-anchor="middle" font-size="12" fill="#c53030" font-weight="600">Wrong matcher</text>
  </g>

  <!-- Fix badge -->
  <g transform="translate(340, 480)">
    <rect x="0" y="0" width="300" height="44" rx="22" fill="#f0fff4" stroke="#7bae7f" stroke-width="1.5"/>
    <text x="150" y="18" text-anchor="middle" font-size="10" fill="#5a9a5e" font-weight="500">FINALLY</text>
    <text x="150" y="34" text-anchor="middle" font-size="13" fill="#2f855a" font-weight="600">Fixed. Tested. Verified. ✓</text>
  </g>

  <!-- Bottom tag -->
  <text x="340" y="570" font-size="13" fill="#8b95a5">Claude Code hooks  ·  PreToolUse  ·  fail-closed design  ·  defense in depth</text>
</svg>
